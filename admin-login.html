<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login - Pickle Social</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="icon" href="logo.jpeg" type="image/jpeg">

  <style>
    :root {
      --bg: #08090c;
      --accent: #ec4899;
      --accent-deep: #be185d;
      --text-primary: #e5e7eb;
      --gray-text: #94a3b8;
      --glow-pink: rgba(236,72,153,0.14);
      --glow-mint: rgba(139,195,74,0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: radial-gradient(circle at 12% 10%, var(--glow-pink) 0%, transparent 18%),
                  radial-gradient(circle at 88% 80%, var(--glow-mint) 0%, transparent 22%),
                  linear-gradient(180deg, #07080b 0%, #181d27 100%);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: rgba(15, 19, 25, 0.95);
      border: 1px solid rgba(236, 72, 153, 0.2);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo {
      height: 48px;
      margin-bottom: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .login-header h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .login-header h1 span {
      color: var(--accent);
    }

    .login-header p {
      color: var(--gray-text);
      font-size: 0.9rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .form-group label {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .form-group input {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      padding: 12px 14px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      transition: all 0.15s;
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .form-group input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(236, 72, 153, 0.3);
      outline: none;
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-deep), var(--accent));
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 8px;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(236, 72, 153, 0.3);
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    .info-box {
      background: rgba(236, 72, 153, 0.05);
      border: 1px solid rgba(236, 72, 153, 0.2);
      padding: 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--gray-text);
      margin-top: 16px;
      line-height: 1.5;
    }

    .toast {
      position: fixed;
      bottom: -80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      border: 1px solid rgba(236, 72, 153, 0.3);
      color: var(--accent);
      padding: 14px 20px;
      border-radius: 10px;
      z-index: 2000;
      transition: bottom 0.3s ease;
      font-weight: 600;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }

    .toast.show {
      bottom: 20px;
    }
  </style>
</head>

<body>

<div class="login-container">
  <div class="login-header">
    <img src="logo.jpeg" alt="Pickle Social" class="login-logo">
    <h1>Pickle Social <span>Admin</span></h1>
    <p>Management Dashboard</p>
  </div>

  <div class="error-message" id="errorMessage"></div>

  <form onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="password">Admin Password</label>
      <input 
        type="password" 
        id="password" 
        placeholder="Enter admin password" 
        required 
        autocomplete="off"
      >
    </div>

    <button type="submit" class="login-btn" id="loginBtn">Login to Dashboard</button>
  </form>

  <div class="info-box">
    💡 <strong>Default Password:</strong> admin123<br>
    Change this in your environment variables for production!
  </div>

  <div class="back-link">
    <a href="index.html">← Back to Booking</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Simple login (in production, use proper authentication!)
  const ADMIN_PASSWORD = 'admin123'; // Change this!

  function handleLogin(e) {
    e.preventDefault();
    
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');

    if (password === ADMIN_PASSWORD) {
      // Store session token
      const token = 'admin_' + Date.now().toString(36);
      sessionStorage.setItem('adminToken', token);
      
      showToast('✅ Login successful! Redirecting...');
      setTimeout(() => {
        window.location.href = 'admin-dashboard.html';
      }, 500);
    } else {
      errorMessage.textContent = '❌ Invalid password';
      errorMessage.classList.add('show');
      document.getElementById('password').value = '';
      
      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 3000);
    }
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
    }, 2000);
  }

  // Check if already logged in
  if (sessionStorage.getItem('adminToken')) {
    window.location.href = 'admin-dashboard.html';
  }
</script>

</body>
</html>
